name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage downloadable assets
        run: |
          mkdir -p docs/assets/templates docs/assets/schedule docs/assets/track-data docs/assets/car-data docs/assets/series-data
          cp data/templates/*.json docs/assets/templates/
          cp data/series-data/series-catalog.json docs/assets/series-data/series-catalog.json
          cp data/schedule/*.pdf docs/assets/schedule/
          cp "data/track-data/track-ids.lookup.json" "docs/assets/track-data/track-ids.lookup.json"
          cp "data/car-data/car-ids.lookup.json" "docs/assets/car-data/car-ids.lookup.json"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4